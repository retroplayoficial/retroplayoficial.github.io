<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroPlay</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1 id="titulo">Carregando...</h1>
        <p id="descricao"></p>
    </header>

    <main>
        <div id="listaJogos">
            Carregando coleção...
        </div>
    </main>

    <footer>
        <a href="index.html">⬅ Voltar</a>
    </footer>

    <!-- Primeiro importamos a função global carregarColecao -->
    <script src="js/colecao-universal.js"></script>

    <!-- Script Inteligente de Inicialização e Correção de Caminhos -->
    <script>
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            let arquivo = params.get("arquivo");
            let id = params.get("id");

            const titulo = document.getElementById("titulo");
            const descricao = document.getElementById("descricao");
            const listaJogos = document.getElementById("listaJogos");

            function mostrarErro(mensagem) {
                titulo.innerHTML = "Erro";
                descricao.innerHTML = "Não foi possível carregar as informações.";
                listaJogos.innerHTML = `<h2>${mensagem}</h2>`;
            }

            // Função definitiva para limpar caminhos duplicados, seja no Linux, Mac ou Windows
            function normalizarCaminho(caminho) {
                if (!caminho) return "";
                
                // 1. Padroniza todas as barras invertidas do Windows (\) para barras normais (/)
                let limpo = caminho.replace(/\\/g, "/");

                // 2. Remove repetições de "data/data/" ou "data//data/" que possam surgir
                limpo = limpo.replace(/data\/data\//gi, "data/");
                limpo = limpo.replace(/\/+/g, "/"); // Remove barras duplicadas como //

                // 3. Remove pontos desnecessários do início do caminho relativos à raiz do servidor
                if (limpo.startsWith("./")) {
                    limpo = limpo.substring(2);
                }

                // 4. Se a página atual NÃO estiver na raiz (ex: em uma pasta /pages/), adiciona "../"
                // Caso contrário, se estiver na raiz, ela lê direto "data/..."
                const naRaiz = !window.location.pathname.includes("/pages/") && !window.location.pathname.includes("/views/");
                if (!naRaiz && !limpo.startsWith("../")) {
                    limpo = "../" + limpo;
                }

                console.log("[Normalizador] Caminho original:", caminho, "-> Final:", limpo);
                return limpo;
            }

            // 1. Se a URL passou o caminho direto do arquivo .json
            if (arquivo) {
                carregarColecao(normalizarCaminho(arquivo));
            } 
            // 2. Se a URL passou o ID ou Nome Amigável (ex: "mario bros" ou "RP-SNES-9992")
            else if (id) {
                console.log("ID ou Referência solicitada pela URL:", id);
                
                // Determina onde está o database.json em relação à página atual
                const naRaiz = !window.location.pathname.includes("/pages/") && !window.location.pathname.includes("/views/");
                let caminhoDb = naRaiz ? "data/database.json" : "../data/database.json";

                fetch(caminhoDb)
                    .then(res => {
                        if (!res.ok) throw new Error("Não foi possível ler o database.json");
                        return res.json();
                    })
                    .then(database => {
                        console.log("Banco de dados local carregado:", database);

                        const idLimpo = id.toLowerCase().trim();

                        // Tenta buscar pelo ID exato do banco (ex: "RP-SNES-9992")
                        let colecao = database.colecoes.find(c => c.id.toLowerCase() === idLimpo);

                        // Se não achar, busca por aproximação
                        if (!colecao) {
                            console.log("Buscando por aproximação no nome ou arquivo do banco de dados...");
                            colecao = database.colecoes.find(c => {
                                const nomeMatch = c.nome.toLowerCase().includes(idLimpo);
                                const fileMatch = c.arquivo.toLowerCase().includes(idLimpo.replace(/\s+/g, "-")) || c.arquivo.toLowerCase().includes(idLimpo);
                                const customMatch = (idLimpo.includes("mario") && c.arquivo.toLowerCase().includes("mario"));
                                return nomeMatch || fileMatch || customMatch;
                            });
                        }

                        if (colecao) {
                            const caminhoFinal = normalizarCaminho(colecao.arquivo);
                            console.log("Coleção localizada! Carregando arquivo:", caminhoFinal);
                            carregarColecao(caminhoFinal);
                        } else {
                            // Super Fallback: monta o arquivo presumido se não encontrar no banco
                            const nomeArquivoPresumido = idLimpo.replace(/\s+/g, "-") + ".json";
                            const caminhoPresumido = normalizarCaminho(`data/snes/${nomeArquivoPresumido}`);
                            console.log("Acessando caminho presumido direto:", caminhoPresumido);
                            carregarColecao(caminhoPresumido);
                        }
                    })
                    .catch(erro => {
                        console.error("Erro ao carregar banco de dados:", erro);
                        // Fallback direto se falhar a leitura completa
                        const nomeArquivoPresumido = id.toLowerCase().trim().replace(/\s+/g, "-") + ".json";
                        carregarColecao(normalizarCaminho(`data/snes/${nomeArquivoPresumido}`));
                    });
            } 
            else {
                mostrarErro("Nenhuma coleção foi especificada para carregar.");
            }
        };
    </script>

</body>
</html>
