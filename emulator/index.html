<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>RetroPlay Emulator</title>

<style>

/* Trava a página na tela do celular sem rolagem */
html, body {

    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
    overflow: hidden !important;

}

/* Elemento pai carregando o EmulatorJS */
#game {

    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    position: relative;

}

/* Limita e centraliza a tela do jogo na parte superior */
#game canvas {

    max-width: 100vw !important;
    max-height: 45vh !important; /* Deixa o jogo ocupando no máximo 45% do topo */
    object-fit: contain !important;
    margin-top: 10px !important;

}

/* Força os botões de toque (Gamepad) a subirem para a parte inferior */
.ejs-gamepad, [class*="gamepad"], [id*="gamepad"] {

    position: absolute !important;
    bottom: 20px !important;
    left: 0 !important;
    width: 100vw !important;
    height: 50vh !important; /* Ocupa a metade inferior perfeitamente ao alcance dos polegares */
    z-index: 9999 !important;

}

</style>

</head>

<body>

<div id="game"></div>

<script>

EJS_player = "#game";

const params = new URLSearchParams(window.location.search);

const rom = params.get("rom");

const consoleName = rom.split("/")[0];

/*
CORES SUPORTADOS PELO RETROPLAY
*/

switch(consoleName){

    // Nintendo

    case "nes":
        EJS_core = "nes";
        break;

    case "snes":
        EJS_core = "snes";
        break;

    case "n64":
        EJS_core = "n64";
        break;

    case "gb":
        EJS_core = "gb";
        break;

    case "gbc":
        EJS_core = "gb";
        break;

    case "gba":
        EJS_core = "gba";
        break;

    case "nds":
        EJS_core = "nds";
        break;



    // Sega

    case "master":
        EJS_core = "segaMS";
        break;

    case "megadrive":
        EJS_core = "segaMD";
        break;

    case "gamegear":
        EJS_core = "segaGG";
        break;



    // Sony

    case "psx":
        EJS_core = "psx";
        break;



    // Atari

    case "atari2600":
        EJS_core = "atari2600";
        break;

    case "lynx":
        EJS_core = "lynx";
        break;



    // Arcade

    case "arcade":
        EJS_core = "arcade";
        break;



    // Neo Geo

    case "neogeo":
        EJS_core = "arcade";
        break;



    // PC Engine

    case "pcengine":
        EJS_core = "pce";
        break;



    // WonderSwan

    case "ws":
        EJS_core = "ws";
        break;

    case "wsc":
        EJS_core = "ws";
        break;



    // Virtual Boy

    case "vb":
        EJS_core = "vb";
        break;



    default:

        alert("Console não suportado: " + consoleName);

        throw new Error("Console inválido");

}

EJS_gameUrl = "../roms/" + rom;

EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>

</html>
