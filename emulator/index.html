<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RetroPlay Emulator</title>

<style>

html,body{

margin:0;
padding:0;
background:#000;
height:100%;

}

#game{

width:100vw;
height:100vh;

}

</style>

</head>

<body>

<div id="game"></div>


<script>

const params = new URLSearchParams(window.location.search);


const consoleSelecionado = params.get("console");
const colecao = params.get("colecao");
const rom = params.get("rom");

if (!consoleSelecionado || !colecao || !rom) {

    document.body.innerHTML = `
    <div style="
    background:#000;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    font-size:25px;">
    Nenhum jogo foi informado.
    </div>
    `;

    throw new Error("Parâmetros ausentes.");

}

console.log("Console:", consoleSelecionado);
console.log("Coleção:", colecao);
console.log("ROM:", rom);


// Configuração EmulatorJS

EJS_player = "#game";


EJS_core = consoleSelecionado;


EJS_gameName = rom.replace(/\.[^/.]+$/, "");


EJS_gameUrl = 
`../roms/${consoleSelecionado}/${colecao}/${encodeURIComponent(rom)}`;


EJS_pathtodata = 
"https://cdn.emulatorjs.org/stable/data/";


EJS_startOnLoaded = true;


EJS_fullscreenOnLoaded = true;


</script>


<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>


</body>

</html>
