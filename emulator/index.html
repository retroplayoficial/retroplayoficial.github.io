<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RetroPlay Emulator</title>


<style>

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    background:#000;

    overflow:hidden;

    font-family:Arial, sans-serif;

}


/* Barra RetroPlay */

#barraRetro{

    position:fixed;

    top:0;

    left:0;

    width:100%;

    height:55px;

    background:rgba(0,0,0,0.85);

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 15px;

    box-sizing:border-box;

    z-index:9999;

}


/* Logo */

.logoRetro{

    color:white;

    font-size:18px;

    font-weight:bold;

}


/* Botões */

.botaoRetro{

    background:#ff6600;

    color:white;

    border:none;

    padding:10px 15px;

    border-radius:10px;

    font-size:14px;

    cursor:pointer;

    margin-left:8px;

}


.botaoRetro:hover{

    background:#ff8c33;

}



/* Área do emulador */

#game{

    position:fixed;

    top:55px;

    left:0;

    width:100%;

    height:calc(100% - 55px);

}



</style>


</head>


<body>



<!-- Barra Premium RetroPlay -->

<div id="barraRetro">


<div class="logoRetro">

🎮 RetroPlay

</div>


<div>


<button 
class="botaoRetro"
onclick="voltarColecao()">

⬅ Coleção

</button>



<button 
class="botaoRetro"
onclick="telaCheia()">

⛶ Tela cheia

</button>


</div>


</div>



<div id="game"></div>




<script>



/*
=============================
CONFIGURAÇÃO EMULATORJS
=============================
*/


EJS_player = "#game";



const params = new URLSearchParams(window.location.search);



const rom = params.get("rom");



if(!rom){

    alert("ROM não encontrada");

    throw new Error("ROM ausente");

}



const partes = rom.split("/");


const consoleName = partes[0];

const colecaoNome = partes[1];




/*
=============================
CORES
=============================
*/


switch(consoleName){



case "nes":

    EJS_core="nes";

break;



case "snes":

    EJS_core="snes";

break;



case "n64":

    EJS_core="n64";

break;



case "gb":

    EJS_core="gb";

break;



case "gbc":

    EJS_core="gb";

break;



case "gba":

    EJS_core="gba";

break;



case "nds":

    EJS_core="nds";

break;



case "master":

    EJS_core="segaMS";

break;



case "megadrive":

    EJS_core="segaMD";

break;



case "gamegear":

    EJS_core="segaGG";

break;



case "psx":

    EJS_core="psx";

break;



case "atari2600":

    EJS_core="atari2600";

break;



case "lynx":

    EJS_core="lynx";

break;



case "arcade":

case "neogeo":

    EJS_core="arcade";

break;



case "pcengine":

    EJS_core="pce";

break;



case "ws":

case "wsc":

    EJS_core="ws";

break;



case "vb":

    EJS_core="vb";

break;



default:


alert(
"Console não suportado: "
+ consoleName
);


throw new Error("Console inválido");


}




/*
=============================
ROM
=============================
*/


EJS_gameUrl = "../roms/" + rom;



EJS_pathtodata =
"https://cdn.emulatorjs.org/stable/data/";




/*
=============================
AJUSTES
=============================
*/


EJS_startOnLoaded = true;


EJS_fullscreenOnLoaded = false;


EJS_aspectRatio = "4/3";




/*
=============================
BOTÃO VOLTAR
=============================
*/


function voltarColecao(){


    if(colecaoNome){


        window.location.href =
        "../nfc.html?colecao="
        + colecaoNome;


    }else{


        window.history.back();


    }


}



/*
=============================
TELA CHEIA
=============================
*/


function telaCheia(){


    const elemento =
    document.documentElement;



    if(elemento.requestFullscreen){


        elemento.requestFullscreen();


    }

    else if(elemento.webkitRequestFullscreen){


        elemento.webkitRequestFullscreen();


    }


}



</script>



<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>



</body>


</html>
