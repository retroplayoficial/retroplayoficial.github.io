<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>RetroPlay Emulator</title>

<style>

body{

    margin:0;

    background:#000;

    color:white;

    font-family:Arial;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

}

#game{

    width:100%;

    height:100%;

}

</style>

</head>


<body>


<div id="game"></div>


<script>

EJS_player = "#game";

EJS_core = "snes";

const params = new URLSearchParams(window.location.search);

const rom = params.get("rom");

EJS_gameUrl = "../roms/" + rom;

EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

</script>


<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>


</body>

</html>
