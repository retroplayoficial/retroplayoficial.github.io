<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RetroPlay Emulator</title>


<style>

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    background:#000;

    overflow:hidden;

}


#game{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

}


</style>


</head>


<body>


<div id="game"></div>



<script>


/*
=============================
CONFIGURAÇÃO EMULATORJS
=============================
*/


EJS_player = "#game";



const params = new URLSearchParams(window.location.search);



const rom = params.get("rom");



if(!rom){

    alert("ROM não encontrada");

    throw new Error("ROM ausente");

}



const consoleName = rom.split("/")[0];



/*
=============================
CORES RETROPLAY
=============================
*/


switch(consoleName){


/* Nintendo */


case "nes":

    EJS_core = "nes";

break;



case "snes":

    EJS_core = "snes";

break;



case "n64":

    EJS_core = "n64";

break;



case "gb":

    EJS_core = "gb";

break;



case "gbc":

    EJS_core = "gb";

break;



case "gba":

    EJS_core = "gba";

break;



case "nds":

    EJS_core = "nds";

break;



/* Sega */


case "master":

    EJS_core = "segaMS";

break;



case "megadrive":

    EJS_core = "segaMD";

break;



case "gamegear":

    EJS_core = "segaGG";

break;



/* Sony */


case "psx":

    EJS_core = "psx";

break;



/* Atari */


case "atari2600":

    EJS_core = "atari2600";

break;



case "lynx":

    EJS_core = "lynx";

break;



/* Arcade */


case "arcade":

    EJS_core = "arcade";

break;



case "neogeo":

    EJS_core = "arcade";

break;



/* PC Engine */


case "pcengine":

    EJS_core = "pce";

break;



/* WonderSwan */


case "ws":

case "wsc":

    EJS_core = "ws";

break;



/* Virtual Boy */


case "vb":

    EJS_core = "vb";

break;



default:


    alert(
    "Console não suportado: "
    + consoleName
    );


    throw new Error(
    "Console inválido"
    );


}




/*
=============================
ROM
=============================
*/


EJS_gameUrl = "../roms/" + rom;



/*
=============================
DADOS EMULATORJS
=============================
*/


EJS_pathtodata =
"https://cdn.emulatorjs.org/stable/data/";



/*
=============================
AJUSTES MOBILE
=============================
*/


// inicia automaticamente

EJS_startOnLoaded = true;


// não força fullscreen

EJS_fullscreenOnLoaded = false;



// mantém proporção original

EJS_aspectRatio = "4/3";



</script>



<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>



</body>


</html>
