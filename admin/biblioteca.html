<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Biblioteca</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="layout">

    <div id="menu"></div>

    <div class="main">

        <h1>📚 Biblioteca RetroPlay</h1>

        <div class="card">

            <h3>Total de Franquias</h3>

            <h2 id="totalBiblioteca">0</h2>

        </div>

        <div class="card">

            <input
                type="text"
                id="pesquisa"
                placeholder="🔍 Pesquisar franquia..."
                onkeyup="filtrarBiblioteca()">

            <select
                id="filtroConsole"
                onchange="filtrarBiblioteca()">

                <option value="">Todos os Consoles</option>

                <option value="snes">Super Nintendo</option>

                <option value="megadrive">Mega Drive</option>

                <option value="n64">Nintendo 64</option>

                <option value="gba">Game Boy Advance</option>

            </select>

        </div>

        <div
            id="listaFranquias"
            class="biblioteca-grid">

            Carregando...

        </div>

    </div>

</div>

<script src="admin.js"></script>

<script>

document.getElementById("menu").innerHTML = criarMenu();

carregarBiblioteca();

</script>

</body>

</html>
